name: Version Sync

on:
  push:
    branches: [main]
    paths:
      - 'core/**/Cargo.toml'
      - 'package.json'

permissions:
  contents: write

jobs:
  sync-versions:
    name: Sync Versions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Source of truth version (package.json): $VERSION"

      - name: Read version from core/Cargo.toml
        id: cargo
        run: |
          # Workspace package version lives under [workspace.package].
          CARGO_VERSION=$(awk '
            /^\[workspace\.package\]/ { in_section = 1; next }
            /^\[/ && in_section { in_section = 0 }
            in_section && /^version = / {
              gsub(/version = "|"/, "")
              print
              exit
            }
          ' core/Cargo.toml)
          echo "version=$CARGO_VERSION" >> "$GITHUB_OUTPUT"
          echo "core/Cargo.toml: $CARGO_VERSION"

      - name: Check if sync is needed
        id: check
        run: |
          PKG="${{ steps.pkg.outputs.version }}"
          CARGO="${{ steps.cargo.outputs.version }}"
          if [ "$PKG" = "$CARGO" ]; then
            echo "Versions match ($PKG). Nothing to do."
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version mismatch detected. package.json=$PKG, core/Cargo.toml=$CARGO"
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update core/Cargo.toml
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          # Replace the version line inside [workspace.package].
          python3 - <<'PY'
          import os, re
          version = os.environ["VERSION"]
          path = "core/Cargo.toml"
          with open(path, "r", encoding="utf-8") as f:
              text = f.read()
          # Match the [workspace.package] section's version line.
          pattern = re.compile(
              r'(\[workspace\.package\][^\[]*?\nversion\s*=\s*")[^"]*(")',
              re.DOTALL,
          )
          new_text, n = pattern.subn(rf'\g<1>{version}\g<2>', text, count=1)
          if n != 1:
              raise SystemExit("Could not find [workspace.package].version in core/Cargo.toml")
          with open(path, "w", encoding="utf-8") as f:
              f.write(new_text)
          PY
        env:
          VERSION: ${{ steps.pkg.outputs.version }}

      - name: Setup Rust toolchain
        if: steps.check.outputs.needed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.lock
        if: steps.check.outputs.needed == 'true'
        working-directory: core
        run: cargo generate-lockfile

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json core/Cargo.toml core/Cargo.lock
          git commit -m "chore: sync versions to $VERSION [skip ci]"
          git push
