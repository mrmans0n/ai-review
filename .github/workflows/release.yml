name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            os: macos-latest
            artifact_name: electron-macos-arm
            rust_target: aarch64-apple-darwin
          - name: linux
            os: ubuntu-22.04
            artifact_name: electron-linux
            rust_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.16.0"

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry/index
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo registry cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry/cache
          key: ${{ runner.os }}-cargo-registry-cache-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo git
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: core/target
          key: ${{ runner.os }}-${{ matrix.name }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test:run

      - name: Build app
        env:
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        run: |
          pnpm exec tsc
          pnpm exec vite build
          pnpm electron:tsc
          cd core
          cargo build --release -p core-sidecar -p core-launcher
          cd ..
          pnpm exec electron-builder --publish never

      - name: Notarize macOS DMGs
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          for var_name in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var_name}" ]; then
              echo "$var_name is required for macOS DMG notarization"
              exit 1
            fi
          done

          DMG_PATHS=()
          while IFS= read -r -d '' dmg_path; do
            DMG_PATHS+=("$dmg_path")
          done < <(find release -maxdepth 1 -name '*.dmg' -type f -print0)

          if [ "${#DMG_PATHS[@]}" -eq 0 ]; then
            echo "DMG not found under release/"
            find release -maxdepth 2 -print
            exit 1
          fi

          for dmg_path in "${DMG_PATHS[@]}"; do
            xcrun notarytool submit "$dmg_path" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg_path"
          done

      - name: Verify signed macOS artifacts
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATHS=()
          while IFS= read -r -d '' app_path; do
            APP_PATHS+=("$app_path")
          done < <(find release -maxdepth 2 -name 'AI Review.app' -type d -print0)

          if [ "${#APP_PATHS[@]}" -eq 0 ]; then
            echo "AI Review.app not found under release/"
            find release -maxdepth 3 -print
            exit 1
          fi

          for app_path in "${APP_PATHS[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl --assess --type execute --verbose "$app_path"
          done

          DMG_PATHS=()
          while IFS= read -r -d '' dmg_path; do
            DMG_PATHS+=("$dmg_path")
          done < <(find release -maxdepth 1 -name '*.dmg' -type f -print0)

          if [ "${#DMG_PATHS[@]}" -eq 0 ]; then
            echo "DMG not found under release/"
            find release -maxdepth 2 -print
            exit 1
          fi

          for dmg_path in "${DMG_PATHS[@]}"; do
            xcrun stapler validate "$dmg_path"
          done

      - name: Collect artifacts (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p artifacts
          cp release/*.dmg artifacts/
          ls -la artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: |
          mkdir -p artifacts
          if [ -d release/linux-unpacked ]; then
            cp -R release/linux-unpacked artifacts/
          fi
          ls -la artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*

  update-homebrew:
    name: Update Homebrew Cask
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Download DMG and compute checksum
        run: |
          curl -fsSL "https://github.com/mrmans0n/ai-review/releases/download/v${VERSION}/AI.Review-${VERSION}-arm64.dmg" -o arm.dmg
          echo "SHA_ARM=$(shasum -a 256 arm.dmg | cut -d' ' -f1)" >> "$GITHUB_ENV"

      - name: Checkout homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/mrmans0n/homebrew-tap.git" homebrew-tap

      - name: Download update script
        run: |
          curl -fsSL "https://raw.githubusercontent.com/mrmans0n/ai-review/${{ github.ref_name }}/.github/workflows/update-cask.py" -o update-cask.py

      - name: Update cask
        working-directory: homebrew-tap
        run: python3 ../update-cask.py

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- Casks/ai-review.rb; then
            echo "Cask already up to date"
            exit 0
          fi
          git add Casks/ai-review.rb
          git commit -m "Update ai-review cask to ${VERSION}"
          git push
